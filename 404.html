<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Pierre Bouteman | Perdu dans l'espace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .error-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex-direction: column;
            padding: 2rem;
            position: relative;
            z-index: 2;
        }
        
        .error-code {
            font-size: clamp(6rem, 15vw, 12rem);
            font-family: var(--font-heading);
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.15; /* Subtle and premium */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            user-select: none;
        }

        .error-message {
            max-width: 600px;
        }

        .error-message h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 1rem;
            color: #fff;
            font-family: var(--font-heading);
        }

        .error-message p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .error-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .btn-glow {
            box-shadow: 0 0 20px rgba(217, 70, 239, 0.4);
            border: 1px solid rgba(217, 70, 239, 0.5);
            background: rgba(112, 66, 248, 0.1);
            color: #fff;
            border-radius: var(--radius-pill);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 1rem 2rem;
            transition: all var(--transition-base);
        }

        .btn-glow:hover {
            box-shadow: 0 0 30px rgba(217, 70, 239, 0.6);
            background: rgba(112, 66, 248, 0.25);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="use-native-cursor">
    <div class="error-page">
        <div class="error-code">Oups</div>
        <div class="error-message">
            <h1>Il semble que vous ayez dérivé...</h1>
            <p>La page que vous recherchez a exploré de nouveaux horizons ou n'a jamais existé. Laissez-moi vous guider vers un lieu sûr.</p>
            <div class="error-actions">
                <a href="index.html" class="btn btn-glow">Retourner à l'accueil</a>
            </div>
        </div>
    </div>
</body>
</html>
